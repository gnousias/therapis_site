    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // A reusable function for the modern "Therapis-style" alert
        function showTherapisAlert(isSuccess) {
            Swal.fire({
                title: isSuccess ? 
                    (currentLang === 'en' ? 'Sent!' : 'Εστάλη!') : 
                    (currentLang === 'en' ? 'Error' : 'Σφάλμα'),
                text: isSuccess ? 
                    (currentLang === 'en' ? 'Thank you! Your request has been sent.' : 'Ευχαριστούμε! Το αίτημά σας στάλθηκε.') : 
                    (currentLang === 'en' ? 'Something went wrong. Please try again.' : 'Κάτι πήγε στραβά. Δοκιμάστε ξανά.'),
                icon: isSuccess ? 'success' : 'error',
                confirmButtonColor: '#2c5f50', // Your brand green
                background: '#fdfdfd'
            });
        }

        // The core sending function
        function sendTherapisEmail(e) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button');
            const originalBtnText = btn.innerHTML;

            // Visual feedback
            btn.innerHTML = currentLang === 'en' ? 'Sending...' : 'Αποστολή...';
            btn.disabled = true;

            // Mapping fields - Using 'name' attributes from your HTML
            const templateParams = {
                name: form.elements['name'] ? form.elements['name'].value : form.elements[0].value,
                phone: form.elements['phone'] ? form.elements['phone'].value : form.elements[1].value,
                condition: form.elements['condition'] ? form.elements['condition'].value : form.elements[2].value,
                language: typeof currentLang !== 'undefined' ? currentLang : 'el'
            };

            emailjs.send("contact_service", "template_u9ar3nh", templateParams)
                .then(function() {
                    showTherapisAlert(true);
                    form.reset();
                })
                .catch(function(error) {
                    showTherapisAlert(false);
                    console.error('EmailJS Error:', error);
                })
                .finally(function() {
                    btn.innerHTML = originalBtnText;
                    btn.disabled = false;
                });
        }

        // Auto-attach to any form with these IDs
        document.addEventListener('DOMContentLoaded', () => {
            const contactForm = document.getElementById('appointmentForm');
            const mainPageForm = document.getElementById('callback-form');

            if (contactForm) contactForm.addEventListener('submit', sendTherapisEmail);
            if (mainPageForm) mainPageForm.addEventListener('submit', sendTherapisEmail);
        });
    </script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("guIynBSjLAhUJgMLc"); // Replace with your Public Key
        })();
    </script>
    <style>
        /* Contact Specific Styling */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
            padding: 80px 10%;
            background: var(--bg-light-green);
        }

        .contact-info-card {
            background: var(--primary-dark);
            color: var(--white);
            padding: 40px;
            border-radius: var(--br-custom);
            height: fit-content;
        }

        .contact-info-card h2 { margin-bottom: 25px; color: var(--mint-pale); }
        .info-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 20px; }
        .info-item i { color: var(--bg-light-green); margin-top: 5px; font-size: larger;}

        .appointment-form {
            background: var(--white);
            padding: 40px;
            border-radius: var(--br-custom);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        .form-group.full { grid-column: span 2; }

        .form-group label { margin-bottom: 8px; font-weight: 400; font-size: 0.9rem; }
        
        .form-group input, .form-group textarea {
            padding: 12px 15px;
            border: 1px solid var(--mint-pale);
            border-radius: 10px 0 10px 0;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-terracotta);
            background: var(--bg-light-green);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            background: var(--accent-terracotta);
            color: white;
            border-radius: var(--br-custom);
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .submit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

        @media (max-width: 900px) {
            .contact-container { grid-template-columns: 1fr; padding: 40px 5%; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
        }
    </style>
</head>
