                <h2 data-en="What is geriatric physiotherapy?" data-el="Τι είναι η γηριατρική φυσικοθεραπεία;">What is geriatric physiotherapy?</h2>
                <p style="margin-bottom: 20px; font-size: large;" data-en="Care tailored to the needs of older adults, with emphasis on fall prevention and osteoporosis management. We enhance muscle strength and balance to promote safe daily living. Home-based treatments are available.
                In collaboration with a trained driver, we also provide safe transportation to and from home (if transfer to the clinic or medical examinations is required)."
                data-el="Φροντίδα προσαρμοσμένη στις ανάγκες της τρίτης ηλικίας με έμφαση στην πρόληψη πτώσεων και τη διαχείριση της οστεοπόρωσης. Ενισχύουμε τη μυϊκή δύναμη και την ισορροπία για μια ασφαλή καθημερινότητα .
                Προσφέρονται θεραπείες κατ’οίκον / Αναλαμβάνουμε σε συνεργασία με εκπαιδευμένο οδηγό την ασφαλή μετακίνηση από και προς το σπίτι (αν χρειαζεται μετακίνηση προς το φυσικοθεραπευτήριο / εξετάσεις).">
                </p>
                <h2 data-en="Group Exercise Programs – Otago Exercise Program" data-el="Ομαδικά προγράμματα άσκησης (OTAGO)"></h2>
                <p data-en="At Therapis Physiotherapy Clinic, we incorporate the internationally recognized Otago Exercise Program as a core component in osteoporosis management and geriatric rehabilitation.
                Through small therapeutic groups, we focus on targeted muscle strengthening and improving proprioception and balance, offering a comprehensive fall-prevention strategy. Clinical exercise is vital for strengthening the skeletal system and preventing fractures and painful surgical interventions. It serves as an essential complement to any pharmacological treatment for osteoporosis, osteopenia, or sarcopenia (oral or injectable).
                Following the guidelines of the University of Otago, we ensure that each patient receives the specialized supervision required to maintain bone density and enhance functional independence." 
                data-el="Στο φυσικοθεραπευτήριο therapis, ενσωματώνουμε το διεθνές πρωτόκολλο Otago Exercise Program ως βασικό πυλώνα στη διαχείριση της οστεοπόρωσης και της γηριατρικής αποκατάστασης. Μέσα από ολιγομελή θεραπευτικά τμήματα, εστιάζουμε στη στοχευμένη αύξηση της μυϊκής ισχύος και τη βελτίωση της ιδιοδεκτικότητας και ισορροπίας, προσφέροντας μια ολοκληρωμένη στρατηγική για την πρόληψη των πτώσεων. Η κλινική άσκηση είναι ζωτικής σημασίας για τη θωράκιση του σκελετικού συστήματος και την αποφυγή καταγμάτων και επώδυνων χειρουργικών επεμβάσεων, λειτουργώντας ως απαραίτητο συμπλήρωμα σε κάθε φαρμακευτική αγωγή σε οστεοπόρωση, οστεοπενία ή και σαρκοπενία (από του στόματος ή ενέσιμη). Ακολουθώντας τις κατευθυντήριες οδηγίες του University of Otago, διασφαλίζουμε ότι κάθε ασθενής λαμβάνει την εξειδικευμένη επίβλεψη που απαιτείται για τη διατήρηση της οστικής πυκνότητας και την ενίσχυση της λειτουργικής του ανεξαρτησίας.">
                </p>
