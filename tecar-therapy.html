                <h2 data-en="What is tecar therapy?" data-el="Τι είναι η θεραπεία tecar;">What is tecar therapy?</h2>
                <p style="margin-bottom: 20px; font-size: large;" data-en="TECAR (Transfer of Energy Capacitive and Resistive) uses radiofrequency energy to activate the body’s natural healing mechanisms, accelerating recovery and reducing pain. Benefits of TECAR Therapy:"
                data-el="Το TECAR (Transfer of Energy Capacitive and Resistive) χρησιμοποιεί ραδιοσυχνότητες για να ενεργοποιήσει τους φυσικούς μηχανισμούς επούλωσης του οργανισμού, επιταχύνοντας την αποκατάσταση και μειώνοντας τον πόνο. Η εφαρμογή της TECAR BACK ENERGY:">
                </p>
                <p style="margin-bottom: 20px; font-size: large;" data-en="
                        <ul class='bio-list'>
                            <li>Increases blood circulation</li>
                            <li>Reduces inflammation and edema</li>
                            <li>Relieves muscle spasms</li>
                            <li>Accelerates tissue regeneration</li>
                        </ul>"
                        data-el="
                        <ul class='bio-list'>
                            <li>Αυξάνει την αιματική κυκλοφορία</li>
                            <li>Μειώνει τη φλεγμονή και το οίδημα</li>
                            <li>Χαλαρώνει τους μυϊκούς σπασμούς</li>
                            <li>Επιταχύνει την αναγέννηση των ιστών</li>
                        </ul>">
                </p>
                <p style="margin-bottom: 20px; font-size: large;" data-en="The application is safe, painless, and provides an immediate pleasant warming sensation. 
                            Advantages:
                        <ul class='bio-list'>
                            <li>Faster recovery</li>
                            <li>Pain reduction from the first sessions</li>
                            <li>Deep action without invasiveness</li>
                            <li>Ideal combination with manual therapy and therapeutic exercise</li>
                        </ul>"
                data-el="Η εφαρμογή γίνεται με ασφάλεια, είναι ανώδυνη και προσφέρει άμεση αίσθηση ευχάριστης θερμότητας. Τα πλεονεκτήματα της χρήσης tecar:
                        <ul class='bio-list'>
                            <li>Ταχύτερη αποκατάσταση</li>
                            <li>Μείωση πόνου από τις πρώτες συνεδρίες</li>
                            <li>Βαθιά δράση χωρίς επεμβατικότητα</li>
                            <li>Συνδυάζεται ιδανικά με χειροθεραπεία και θεραπευτική άσκηση</li>
                        </ul>
                ">
                </p>
                <p style="margin-bottom: 20px; font-size: large;" data-en="At Therapis, we combine TECAR therapy with massage, IASTM tools, manual therapy, and exercise to provide a modern physiotherapy experience. Using high-precision TECAR applicators, we directly treat post-surgical incisions and scars, stimulating collagen production and improving tissue elasticity from the early healing stages.
                This specialized application helps prevent adhesions and promotes functional soft tissue remodeling, ensuring smooth recovery without movement restrictions after surgery. Our goal is your safe and effective return to daily and athletic activities."
                data-el="Στο Therapis, συνδυάζουμε την θεραπεία tecar με χειρομάλαξη, εργαλεία IASTM, manual therapy και άσκηση για να έχετε την πιο συγχρονη εμπειρία φυσικοθεραπείας. Χρησιμοποιώντας τις ειδικές κεφαλές TECAR υψηλής ακρίβειας, παρεμβαίνουμε άμεσα σε μετεγχειρητικές τομές και ουλές, διεγείροντας την παραγωγή κολλαγόνου και βελτιώνοντας την ελαστικότητα του ιστού από τα πρώτα στάδια της επούλωσης. Η εξειδικευμένη εφαρμογή των κεφαλών αυτών στοχεύει στην οριστική αποφυγή των συμφύσεων και στη λειτουργική αναδιοργάνωση των μαλακών μορίων, διασφαλίζοντας μια ομαλή αποκατάσταση χωρίς περιορισμούς στην κίνηση μετά από κάθε χειρουργική επέμβαση.  Στόχος μας είναι η ασφαλής και αποτελεσματική επιστροφή σας στις καθημερινές και αθλητικές σας δραστηριότητες.">

                </p>
