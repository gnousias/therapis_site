                <h2 data-en="What is functional magnetic stimulation or FMS?" data-el="Τι είναι ο υψηλής έντασης μαγνητικός διεγέρτης;">What is functional magnetic stimulation or FMS?</h2>
                <p style="margin-bottom: 20px; font-size: large;" data-en="This is an innovative, non-invasive method that uses strong magnetic fields (up to 3 Tesla) to provide deep treatment where classic methods stop.
                        The magnetic field painlessly penetrates tissues, bones and clothing, reaching a depth of up to 10 centimeters. There, it directly stimulates nerve cells and muscle fibers, causing controlled contractions and accelerating cellular metabolism.
                        FMS is the top choice for treating bone edema. Its action focuses on:
                        <ul class='bio-list'>
                            <li>Rapid absorption of edema</li>
                            <li>Osteogenesis</li>
                        </ul>
                        Its application is multidimensional and includes:
                        <ul class='bio-list'>
                            <li>Musculoskeletal Diseases: Back pain, sciatica, cervical syndrome, shoulder periarthritis.</li>
                            <li>Sports Injuries: Bruises, sprains, tendonitis.</li>
                            <li>Neurological Rehabilitation: Muscle atrophy, nerve palsy, retraining after strokes.</li>
                            <li>Urogynaecology: Combined with pelvic floor strengthening, incontinence treatment.</li>
                        </ul>
                        "
                data-el="Πρόκειται για μια πρωτοποριακή, μη επεμβατική μέθοδο που χρησιμοποιεί ισχυρά μαγνητικά πεδία (έως 3 Tesla) για να προσφέρει βαθιά θεραπεία εκεί που οι κλασικές μέθοδοι σταματούν.
                        Το μαγνητικό πεδίο διαπερνά ανώδυνα τους ιστούς, τα οστά και τα ρούχα, φτάνοντας σε βάθος έως και 10 εκατοστά. Εκεί, διεγείρει άμεσα τα νευρικά κύτταρα και τις μυϊκές ίνες, προκαλώντας ελεγχόμενες συσπάσεις και επιταχύνοντας τον κυτταρικό μεταβολισμό.
                        Το FMS αποτελεί την κορυφαία επιλογή για την αντιμετώπιση του οστικού οιδήματος. Η δράση του επικεντρώνεται στην:
                        <ul class='bio-list'>
                            <li>Ταχεία απορρόφηση του οιδήματος</li>
                            <li>Οστεογένεση</li>
                        </ul>
                        Η εφαρμογή του είναι πολυδιάστατη και περιλαμβάνει:
                        <ul class='bio-list'>
                            <li>Μυοσκελετικές Παθήσεις: Οσφυαλγία, ισχιαλγία, αυχενικό σύνδρομο, περιαρθρίτιδα ώμου.</li>
                            <li>Αθλητικές Κακώσεις: Θλάσεις, διαστρέμματα, τενοντίτιδες.</li>
                            <li>Νευρολογική Αποκατάσταση: Μυϊκή ατροφία, πάρεση νεύρων, επανεκπαίδευση μετά από εγκεφαλικά επεισόδια.</li>
                            <li>Ουρογυναικολογία: Συνδυαστικά με ενδυνάμωση πυελικού εδάφους,αντιμετώπιση ακράτειας.</li>
                        </ul>">
                </p>
